<section class="auth-section vh-100 bg-primary">

  <!-- Overlay -->
  <div class="mask gradient-custom-3 d-flex align-items-center h-100">

    <div class="container h-100">

      <div class="row d-flex justify-content-center align-items-center h-100">

        <div class="col-12 col-md-9 col-lg-7 col-xl-5">

          <!-- Card -->
          <div class="card auth-card shadow-lg">

            <div class="card-body p-5">

              <!-- Title -->
              <h2 class="text-uppercase text-center fw-bold mb-4">
                Create an account
              </h2>

              <!-- Form -->
              <form>

                <!-- Name -->
                <div class="mb-4">
                  <label for="name" class="form-label fw-semibold">
                    Your Name
                  </label>

                  <input
                    type="text"
                    id="name"
                    class="form-control form-control-lg"
                    placeholder="Enter your name">
                </div>

                <!-- Email -->
                <div class="mb-4">
                  <label for="email" class="form-label fw-semibold">
                    Your Email
                  </label>

                  <input
                    type="email"
                    id="email"
                    class="form-control form-control-lg"
                    placeholder="Enter your email">
                </div>

                <!-- Password -->
                <div class="mb-4">
                  <label for="password" class="form-label fw-semibold">
                    Password
                  </label>

                  <input
                    type="password"
                    id="password"
                    class="form-control form-control-lg"
                    placeholder="Enter your password">
                </div>

                <!-- Confirm Password -->
                <div class="mb-4">
                  <label for="confirmPassword" class="form-label fw-semibold">
                    Confirm Password
                  </label>

                  <input
                    type="password"
                    id="confirmPassword"
                    class="form-control form-control-lg"
                    placeholder="Repeat your password">
                </div>

                <!-- Checkbox -->
                <div class="form-check mb-4">

                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="terms">

                  <label class="form-check-label" for="terms">
                    I agree to the
                    <a href="#" class="text-primary fw-semibold text-decoration-none">
                      Terms of service
                    </a>
                  </label>

                </div>

                <!-- Button -->
                <div class="d-grid mb-4">

                  <button
                    type="submit"
                    class="btn btn-primary btn-lg">

                    Register

                  </button>

                </div>

                <!-- Footer -->
                <p class="text-center text-muted mb-0">

                  Already have an account?

                  <a routerLink="/" class="fw-bold text-primary text-decoration-none">
                    Login here
                  </a>

                </p>

              </form>

            </div>

          </div>
          <!-- End Card -->

        </div>

      </div>

    </div>

  </div>

</section>
