<section class="auth-section vh-100 bg-primary">

  <!-- Overlay -->
  <div class="mask gradient-custom-3 d-flex align-items-center h-100">

    <div class="container h-100">

      <div class="row d-flex justify-content-center align-items-center h-100">

        <div class="col-12 col-md-9 col-lg-7 col-xl-5">

          <!-- Card -->
          <div class="card auth-card shadow-lg">

            <div class="card-body p-5">

              <!-- Title -->
              <h2 class="text-uppercase text-center fw-bold mb-4">
                Create an account
              </h2>

              <!-- Form -->
              <form (ngSubmit)="onSubmit()" #form="ngForm">

                <!-- Name -->
                <div class="mb-4">
                  <label for="name" class="form-label fw-semibold">
                    Nom
                  </label>

                  <input
                    type="text"
                    id="name"
                    class="form-control form-control-lg"
                    [(ngModel)]="formData.naame"
                    name="naame"
                    placeholder="Entrer votre nom" required>
                </div>

                <!-- Email -->
                <div class="mb-4">
                  <label for="email" class="form-label fw-semibold">
                    Email (login)
                  </label>

                  <input
                    type="email"
                    id="email"
                    class="form-control form-control-lg"
                    [(ngModel)]="formData.email"
                    name="email"
                    placeholder="votre email" required>
                </div>

                <!-- Password -->
                <div class="mb-4">
                  <label for="password" class="form-label fw-semibold">
                    Password (8 caractères minimum)
                  </label>

                  <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-control form-control-lg"
                     [(ngModel)]="formData.password"
                    placeholder="Entrer votre mot de passe" required>
                </div>

                <!-- Confirm Password -->
                <div class="mb-4">
                  <label for="confirmPassword" class="form-label fw-semibold">
                    Confirm Password
                  </label>

                  <input
                    type="password"
                    id="confirmPassword"
                    name="password_confirmation"
                    class="form-control form-control-lg"
                    [(ngModel)]="formData.password_confirmation"
                    placeholder="confirmer le mot de passe" required>
                </div>

                <!-- Checkbox -->
                <div class="form-check mb-4">

                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="terms" required>

                  <label class="form-check-label" for="terms">
                    I agree to the
                    <a href="#" class="text-primary fw-semibold text-decoration-none">
                      Terms of service
                    </a>
                  </label>

                </div>

                <!-- Button -->
                <div class="d-grid mb-4">

                  <button
                    type="submit"
                    class="btn btn-primary btn-lg">

                    Register

                  </button>
                  <br>
                  <button
                      type="reset"
                      class="btn btn-danger btn-lg"
                      (click)="onReset(form)">

                      Annuler

                   </button>

                </div>

                <!-- Footer -->
                <p class="text-center text-muted mb-0">

                  Already have an account?

                  <a routerLink="/" class="fw-bold text-primary text-decoration-none">
                    Login here
                  </a>

                </p>

              </form>

            </div>

          </div>
          <!-- End Card -->

        </div>

      </div>

    </div>

  </div>

</section>
