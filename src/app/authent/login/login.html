<div class="container-fluid min-vh-100 d-flex justify-content-center align-items-center bg-primary">
  
  <div class="row w-100 justify-content-center">
    
    <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-4">
      
      <div class="card shadow border-0 rounded-4">
        
        <div class="card-body p-4">

          <!-- Pills navs -->
          <ul class="nav nav-pills nav-justified mb-4" id="ex1" role="tablist">
            <li class="nav-item" role="presentation">
              <a [routerLink]="['/creercpte']" class="nav-link active" >
                Créer un compte
              </a>
            </li>
          </ul>

          <!-- Pills content -->
          <div class="tab-content">

            <!-- LOGIN -->
            <div class="tab-pane fade show active" 
              id="pills-login" role="tabpanel">

              <form (ngSubmit)="onSubmit()" #form="ngForm">

                <div class="mb-3">
                  <input  [(ngModel)]="formData.email"
                    name="email" type="email" class="form-control" 
                    placeholder="Email" required>
                </div>

                <div class="mb-3">
                  <input [(ngModel)]="formData.password" 
                  name="password" type="password" class="form-control" 
                    placeholder="Mot de passe" required>
                </div>

                <div class="d-flex justify-content-between mb-4">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">
                      Remember me
                    </label>
                  </div>

                  <a href="#">Forgot?</a>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                  Se connecter
                </button>
                <br><br>
                <button
                      type="reset"
                      class="btn btn-danger w-100"
                      (click)="onReset(form)">
                      Annuler
                   </button>
              </form>

            </div>


          </div>

        </div>

      </div>

    </div>

  </div>

</div>
