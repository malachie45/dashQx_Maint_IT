<div class="container-fluid min-vh-100 d-flex justify-content-center align-items-center bg-primary">
  
  <div class="row w-100 justify-content-center">
    
    <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-4">
      
      <div class="card shadow border-0 rounded-4">
        
        <div class="card-body p-4">

          <!-- Pills navs -->
          <ul class="nav nav-pills nav-justified mb-4" id="ex1" role="tablist">
            <li class="nav-item" role="presentation">
              <a [routerLink]="['/creercpte']" class="nav-link active" >
                Créer un compte
              </a>
            </li>
          </ul>

          <!-- Pills content -->
          <div class="tab-content">

            <!-- LOGIN -->
            <div class="tab-pane fade show active" 
              id="pills-login" role="tabpanel">

              <form (ngSubmit)="onSubmit()" #form="ngForm">

                <!-- <div class="text-center mb-3">
                  <p>ou</p>

                  <button type="button" class="btn btn-link btn-floating mx-1">
                    <i class="fab fa-facebook-f"></i>
                  </button>

                  <button type="button" class="btn btn-link btn-floating mx-1">
                    <i class="fab fa-google"></i>
                  </button>

                  <button type="button" class="btn btn-link btn-floating mx-1">
                    <i class="fab fa-github"></i>
                  </button>
                </div> -->

                <p class="text-center">Se connecter:</p>

                <div class="mb-3">
                  <input type="email" class="form-control" 
                    placeholder="Email">
                </div>

                <div class="mb-3">
                  <input type="password" class="form-control" 
                    placeholder="Mot de passe">
                </div>

                <div class="d-flex justify-content-between mb-4">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">
                      <a [routerLink]="['/lay']" class="nav-link active" >Remember me</a>
                    </label>
                  </div>

                  <a href="#">Forgot?</a>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                  Sign In
                </button>

              </form>

            </div>

            <!-- REGISTER -->
            <div class="tab-pane fade" 
              id="pills-register" role="tabpanel">

              <form>

                <div class="mb-3">
                  <input type="text" class="form-control" placeholder="Name">
                </div>

                <div class="mb-3">
                  <input type="text" class="form-control" placeholder="Username">
                </div>

                <div class="mb-3">
                  <input type="email" class="form-control" placeholder="Email">
                </div>

                <div class="mb-3">
                  <input type="password" class="form-control" placeholder="Password">
                </div>

                <div class="mb-3">
                  <input type="password" class="form-control" placeholder="Repeat password">
                </div>

                <button type="submit" class="btn btn-success w-100">
                  Register
                </button>

              </form>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
