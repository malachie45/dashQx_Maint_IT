<div class="container mt-4">

  <!-- KPI -->
  <div class="row mb-4">

    <div class="col-md-4">
      <div class="card text-white bg-primary shadow-sm">
        <div class="card-body text-center">
          <h5 class="card-title">Entrées</h5>
          <p class="display-6">{{ statss.nombre_entrees }}</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-white bg-success shadow-sm">
        <div class="card-body text-center">
          <h5 class="card-title">Sorties</h5>
          <p class="display-6">{{ statss.nombre_sorties }}</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-white bg-warning shadow-sm">
        <div class="card-body text-center">
          <h5 class="card-title">Missions</h5>
          <p class="display-6">{{ statss.nombre_missions }}</p>
        </div>
      </div>
    </div>

  </div>

  <!-- TABLEAU -->
  <div class="card shadow-sm mb-4">

    <div class="card-header bg-dark text-white">
      Détails par équipement
    </div>

    <div class="card-body">

      <table class="table table-striped table-bordered table-hover">

        <thead class="table-dark">
          <tr>
            <th>Équipement</th>
            <th>Entrées</th>
            <th>Sorties</th>
          </tr>
        </thead>

        <tbody>

          <tr *ngFor="let statby of statssbyeqpt">
            <td>{{ statby.nom_eqpt }}</td>
            <td>{{ statby.entrees }}</td>
            <td>{{ statby.sorties }}</td>
          </tr>

        </tbody>

      </table>

    </div>

  </div>

  <!-- GRAPHIQUES -->
  <div class="row mt-4">

    <!-- Graphique circulaire -->
    <div class="col-lg-5 mb-4">

      <div class="card shadow-sm h-100">

        <div class="card-header bg-primary text-white">
          Répartition globale
        </div>

        <div class="card-body d-flex justify-content-center align-items-center">

          <canvas
            baseChart
            [data]="{
              labels: pieChartLabels,
              datasets: pieChartData
            }"
            [type]="'pie'">
          </canvas>

        </div>

      </div>

    </div>

    <!-- Graphique barres -->
    <div class="col-lg-7">

      <div class="card shadow-sm h-100">

        <div class="card-header bg-success text-white">
          Entrées / Sorties par équipement
        </div>

        <div class="card-body">

          <canvas
            baseChart
            [data]="{
              labels: barChartLabels,
              datasets: barChartData
            }"
            [type]="'bar'">
          </canvas>

        </div>

      </div>

    </div>

  </div>

</div>
