<div class="container mt-4">

  <div class="row mb-4">
    <div class="col-md-4">
      <div class="card text-white bg-primary mb-3 shadow-sm">
        <div class="card-body text-center">
          <h5 class="card-title">Entrées par équipement</h5>
          <p class="display-6">{{ statss.nombre_entrees }}</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-white bg-success mb-3 shadow-sm">
        <div class="card-body text-center">
          <h5 class="card-title">Sorties par équipement</h5>
          <p class="display-6">{{ statss.nombre_sorties }}</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-white bg-warning mb-3 shadow-sm">
        <div class="card-body text-center">
          <h5 class="card-title">Missions</h5>
          <p class="display-6">{{ statss.nombre_missions }}</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Tableau détaillé par équipement -->
  <div class="card shadow-sm">
    <div class="card-header bg-dark text-white">
      Détails par équipement
    </div>
    <div class="card-body">
      <table class="table table-striped table-bordered">
        <thead class="table-dark">
          <tr>
            <th>Équipement</th>
            <th>Entrées</th>
            <th>Sorties</th>
            <th>Missions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let equip of stats.equipements">
            <td>{{ equip.nom }}</td>
            <td>{{ equip.entrees }}</td>
            <td>{{ equip.sorties }}</td>
            <td>{{ equip.missions }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
